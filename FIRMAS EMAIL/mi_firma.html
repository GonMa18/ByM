<head>
<style>
  .tabla{
    border-collapse: collapse;
    table-layout: fixed;
    overflow: hidden;
    min-width: 470px;
  }
  .celda{
    background-color: #fff;
    border: 1px solid rgba(0, 0, 0, 0);
    white-space: nowrap;
  }
  .celda.linkedin {
    width: 40px;
    height: 40px;
    border-left:  #2257B0 solid 3px;
    padding: 4px;
  }
  .celda.inferior {
    width: 40px;
    border-top:#2257B0 solid 3px;
  }
  .celda.nombre{
    height: 20px;
  }
  .celda.cargo-equipo {
    height: 20px;
  }
  .celda.telefono {
    height: 20px;
  }
  .celda.correo {
    height: 20px;
  }
  .celda.web {
    text-align: center;
  }
  .celda.ubicacion {
    text-align: center;
  }
  .celda.info-email {
    text-align: center;
  }
  .celda.frase {
    text-align: center;
  }
  .celda.social {
    width: 60px;
  }
  .nombre {
    font-size: 15px;
    color: #3781c7;
    font-weight: bold;
    padding-right: 10px;
  }
  .cargo {
    font-size: 9px;
    color: #2257B0;
    font-style: italic;
  }
  .equipo {
    font-size: 9px;
    color: #3781c7;
    margin-left: 20px;
  }
  .icono{
    height: 13px;
    width: auto;               /* mantiene proporción */
    vertical-align: middle;
    margin-right: 5px;
    display: inline-block;

    stroke: currentColor;      /* color por CSS */
  }
  :root{
    --icon-stroke: 1;  /* valor base global */
  }
  .logo-bisky {
    width: 100px;
    height: 100px;
  }
  .icono-linkedin {
    width: 40px;
    height: 40px;
  }
  .icono-social {
    width: 16px;
    height: 16px;
    vertical-align: middle;
    margin-right: 2px;
  }
  .span-web {
    font-size: 9px;
    color: black;
  }
  .span-social {
    font-size: 9px;
    color: black;
  }
  .span-email {
    font-size: 9px;
    color: black;
  }
  .span-telefono {
    font-size: 9px;
    color: black;
  }
  .span-lugar {
    font-size: 9px;
    color: #2257B0;
    vertical-align: middle;
    margin-left: 4px;
  }
  .span-frase {
    font-size: 9px;
    color: #2257B0;
    font-style: italic;
    padding-left: 21px;
    padding-right: 10px;
    display: block;
    margin: 2px 0;
  }
  a {
    color: inherit;
    text-decoration: none;
  }
</style>
</head>
