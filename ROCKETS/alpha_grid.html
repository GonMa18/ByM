<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visor 3D - Alpha</title>
  <style>
    body { margin: 0; overflow: hidden; background: #4f4f4f; font-family: Arial, sans-serif; }
    #status {
      position: fixed;
      top: 12px;
      left: 12px;
      right: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      color: #fff;
      background: rgba(20, 24, 30, 0.82);
      line-height: 1.35;
      z-index: 10;
      pointer-events: none;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="status">Cargando librerias 3D...</div>

  <script>
    function setStatus(msg) {
      var el = document.getElementById("status");
      if (el) el.textContent = msg;
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js" onerror="setStatus('No se pudo cargar three.min.js (CDN/red).')"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js" onerror="setStatus('No se pudo cargar OrbitControls.js (CDN/red).')"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js" onerror="setStatus('No se pudo cargar GLTFLoader.js (CDN/red).')"></script>

  <script>
    (function () {
      if (!window.THREE || !THREE.OrbitControls || !THREE.GLTFLoader) {
        setStatus("Faltan librerias de Three.js. Revisa internet o bloqueos del navegador.");
        return;
      }

      setStatus("Cargando modelo...");

      var scene = new THREE.Scene();
      scene.background = new THREE.Color(0x4f4f4f);

      var camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.01, 1000);
      camera.position.set(1.8, 1.2, 1.8);

      var renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.outputEncoding = THREE.sRGBEncoding;
      document.body.appendChild(renderer.domElement);

      var controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.target.set(0, 0.3, 0);

      scene.add(new THREE.HemisphereLight(0xffffff, 0x2f2f2f, 1.1));
      var dir = new THREE.DirectionalLight(0xffffff, 1.2);
      dir.position.set(4, 7, 3);
      scene.add(dir);

      var grid = new THREE.GridHelper(80, 20, 0xb0b0b0, 0x8f8f8f);
      scene.add(grid);

      var loader = new THREE.GLTFLoader();
      loader.load(
        "./alpha/alpha.gltf",
        function (gltf) {
          var model = gltf.scene;
          scene.add(model);

          var box = new THREE.Box3().setFromObject(model);
          var center = box.getCenter(new THREE.Vector3());
          var size = box.getSize(new THREE.Vector3());

          model.position.sub(center);
          model.position.y += size.y * 0.5;

          var radius = Math.max(size.x, size.y, size.z) * 1.6;
          camera.position.set(radius, radius * 0.8, radius);
          controls.target.set(0, size.y * 0.35, 0);
          controls.update();

          setStatus("Modelo cargado correctamente.");
        },
        undefined,
        function (error) {
          var msg = (error && error.message) ? error.message : String(error);
          setStatus("Error al cargar glTF: " + msg);
        }
      );

      window.addEventListener("resize", function () {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
      }
      animate();
    })();
  </script>
</body>
</html>
