<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visor 3D - Charlie</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    body { margin: 0; background: #4f4f4f; font-family: Arial, sans-serif; }
    #wrap { position: relative; width: 100vw; height: 100vh; }
    model-viewer {
      width: 100%;
      height: 100%;
      background: #4f4f4f;
    }
    #status {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      color: #fff;
      background: rgba(20, 24, 30, 0.82);
      line-height: 1.35;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <model-viewer
      id="mv"
      src=""
      alt="Modelo 3D Atlas"
      camera-controls
      auto-rotate
      camera-target="auto auto auto"
      camera-orbit="0deg 75deg auto"
      environment-image="neutral"
      shadow-intensity="0.8"
      exposure="1.2"
      loading="eager">
    </model-viewer>
    <div id="status">Comprobando archivos...</div>
  </div>

  <script>
    const mv = document.getElementById("mv");
    const status = document.getElementById("status");
    const gltfUrl = "./atlas/atlas.gltf";
    const binUrl = "./atlas/atlas.bin";
    const pngUrl = "./atlas/vinilo1.png";

    async function check(url) {
      const res = await fetch(url, { method: "GET", cache: "no-store" });
      if (!res.ok) {
        throw new Error(url + " -> HTTP " + res.status);
      }
    }

    async function init() {
      try {
        await check(gltfUrl);
        await check(binUrl);
        await check(pngUrl);
        status.textContent = "Archivos OK. Cargando modelo...";
        mv.src = gltfUrl;
      } catch (e) {
        status.textContent = "Fallo de ruta/servidor: " + e.message;
      }
    }

    mv.addEventListener("load", () => {
      status.textContent = "Modelo cargado. Si no lo ves, mueve la camara (arrastrar/rueda).";
    });

    mv.addEventListener("error", () => {
      status.textContent = "Error al parsear/cargar el glTF (aunque los archivos existan).";
    });

    setTimeout(() => {
      if (!customElements.get("model-viewer")) {
        status.textContent = "No se ha cargado model-viewer (CDN bloqueado o sin internet).";
      }
    }, 1500);

    init();
  </script>
</body>
</html>
