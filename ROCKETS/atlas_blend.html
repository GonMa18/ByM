<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atlas (.blend a .glb)</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #4f4f4f;
      color: #f2f2f2;
      font-family: Arial, sans-serif;
    }
    .card {
      width: min(820px, 92vw);
      background: rgba(20, 24, 30, 0.85);
      border-radius: 10px;
      padding: 18px 20px;
      line-height: 1.45;
    }
    .ok { color: #9be49b; }
    .warn { color: #ffd37a; }
    a { color: #9ec9ff; }
    code {
      background: rgba(255, 255, 255, 0.08);
      padding: 2px 6px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Atlas usando solo .blend</h2>
    <p id="check">Comprobando <code>./atlas/dev/untitled.blend</code>...</p>
    <p id="glb-check">Comprobando <code>./atlas/atlas.glb</code>...</p>
    <p class="warn">
      El navegador no puede renderizar archivos <code>.blend</code> directamente.
      Para verlo en HTML, hay que convertirlo a <code>.glb</code> o <code>.gltf</code>.
    </p>
    <p>
      Puedes abrir el modelo convertido desde
      <a href="./atlas_blend_view.html">atlas_blend_view.html</a>.
    </p>
  </div>

  <script>
    (async function () {
      const el = document.getElementById("check");
      const glbEl = document.getElementById("glb-check");

      try {
        const res = await fetch("./atlas/dev/untitled.blend", { method: "HEAD", cache: "no-store" });
        if (res.ok) {
          el.className = "ok";
          el.textContent = "Archivo detectado: ./atlas/dev/untitled.blend";
        } else {
          el.className = "warn";
          el.textContent = "No se pudo leer ./atlas/dev/untitled.blend (HTTP " + res.status + ").";
        }
      } catch (e) {
        el.className = "warn";
        el.textContent = "No se pudo comprobar el .blend desde este servidor.";
      }

      try {
        const res = await fetch("./atlas/atlas.glb", { method: "HEAD", cache: "no-store" });
        if (res.ok) {
          glbEl.className = "ok";
          glbEl.textContent = "Conversion lista: ./atlas/atlas.glb";
        } else {
          glbEl.className = "warn";
          glbEl.textContent = "No se encontro ./atlas/atlas.glb (HTTP " + res.status + ").";
        }
      } catch (e) {
        glbEl.className = "warn";
        glbEl.textContent = "No se pudo comprobar atlas.glb desde este servidor.";
      }
    })();
  </script>
</body>
</html>
